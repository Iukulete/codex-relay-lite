name: Package VSIX

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check extension syntax
        run: npm run check

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-relay-lite-vsix
          path: "*.vsix"

      - name: Read package version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Remove malformed v release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag: "v" });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: "tags/v" });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Codex Relay Lite ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: "*.vsix"
          make_latest: true
