    <text x="230" y="134" fill="#f8fafc" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14">OpenAI Compatible</text>

    <text x="24" y="176" fill="#93c5fd" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">Base URL</text>
