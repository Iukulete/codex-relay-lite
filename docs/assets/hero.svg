<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Codex Relay Lite product preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="26" fill="url(#bg)"/>

  <g transform="translate(70 66)">
    <path d="M71 8A62 62 0 1 0 71 132" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
    <path d="M67 44A26 26 0 1 0 67 96" fill="none" stroke="#f8fafc" stroke-width="9" stroke-linecap="round" opacity="0.92"/>
    <path d="M86 70h38M105 51v38" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(218 68)">
    <text x="0" y="45" fill="#f8fafc" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="800">Codex Relay Lite</text>
    <text x="0" y="86" fill="#bae6fd" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="20">中文 Windows 用户的极简 Codex 中转站配置器</text>
    <text x="0" y="124" fill="#cbd5e1" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="17">不做代理，不接管 Codex，只把 provider/profile/key 这件小事做稳。</text>
  </g>

  <g transform="translate(70 238)">
