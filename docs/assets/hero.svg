    <rect x="220" y="0" width="226" height="44" rx="22" fill="#13251f" stroke="#2f5f50"/>
    <text x="248" y="29" fill="#dcfce7" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700">No local proxy</text>
    <rect x="466" y="0" width="268" height="44" rx="22" fill="#241f13" stroke="#64512a"/>
    <text x="494" y="29" fill="#fef3c7" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700">SecretStorage + env</text>
  </g>

  <g transform="translate(720 62)" filter="url(#soft)">
