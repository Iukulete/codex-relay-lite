    <text x="40" y="212" fill="#f8fafc" font-family="Consolas, monospace" font-size="14">https://api.deepseek.com</text>

    <rect x="24" y="246" width="112" height="34" rx="8" fill="#075985"/>
    <text x="50" y="268" fill="#f0f9ff" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700">测试连接</text>
    <rect x="150" y="246" width="112" height="34" rx="8" fill="#0e7490"/>
    <text x="176" y="268" fill="#f0f9ff" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700">保存配置</text>
