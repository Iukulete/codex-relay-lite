    <text x="24" y="98" fill="#93c5fd" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">配置名称 / profile</text>
    <rect x="24" y="110" width="168" height="36" rx="7" fill="#111827" stroke="#334155"/>
    <text x="40" y="134" fill="#f8fafc" font-family="Consolas, monospace" font-size="14">deepseek</text>

    <text x="214" y="98" fill="#93c5fd" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13">API 提供商</text>
